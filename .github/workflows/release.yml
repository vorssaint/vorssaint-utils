name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build & publish DMG
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Set up signing
        env:
          SIGNING_CERT_P12: ${{ secrets.SIGNING_CERT_P12 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: ./Tools/ci-setup-signing.sh

      - name: Build
        run: ./build.sh

      - name: Selftest
        run: ./build/VorssaintUtils --selftest

      - name: Package DMG
        run: ./Tools/make-dmg.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.dmg
          generate_release_notes: true
          body: |
            ### Opening it the first time

            Vorssaint is signed but not notarized by Apple, so macOS shows a
            security warning on the first launch. It's open source, so you can
            read every line or build it yourself. To open it, do one of these once:

            - **System Settings › Privacy & Security**, scroll to **Security**,
              then click **Open Anyway**.
            - Or in Terminal: `xattr -dr com.apple.quarantine "/Applications/Vorssaint Utils.app"`
